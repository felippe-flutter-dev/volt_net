name: VoltNet CI/CD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

# Permissões necessárias para o Trusted Publishing no pub.dev
permissions:
  id-token: write # Obrigatório para autenticação OIDC
  contents: write # Para permitir tags automáticas se desejar

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test --coverage

      - name: Verify Pub Publishing
        run: dart pub publish --dry-run

  # Job de deploy: Só roda na main após o sucesso do job 'build'
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # Publicação automática no pub.dev via Trusted Publishing
      - name: Publish to pub.dev
        run: dart pub publish --force
