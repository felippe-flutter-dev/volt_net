name: VoltNet CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "staging" ]

permissions:
  id-token: write
  contents: write # Necessário para o commit automático da versão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test --coverage

  # Job que decide a versão, atualiza o pubspec e publica
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para analisar o histórico de commits

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Cider
        run: dart pub global activate cider

      # Lógica de Versionamento Automático baseada em commits
      # Se a mensagem do commit contiver "feat:", aumenta Minor. 
      # Se contiver "fix:", aumenta Patch. Senão, aumenta Patch por padrão.
      - name: Auto Version Bump
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$COMMIT_MSG" == *"feat:"* ]]; then
            cider bump minor
          elif [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            cider bump major
          else
            cider bump patch
          fi
          
          # Atualiza o log do Cider (opcional, mas bom para o changelog)
          # cider log "Automatic release for: $COMMIT_MSG"

      # Salva a nova versão no repositório (Commit & Push)
      - name: Commit version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          git add pubspec.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - uses: dart-lang/setup-dart@v1

      - name: Install Dependencies
        run: flutter pub get

      - name: Publish to pub.dev
        run: flutter pub publish --force
