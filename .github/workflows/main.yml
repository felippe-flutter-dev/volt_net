name: VoltNet CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # Gatilho para publicação
  pull_request:
    branches: [ "main", "staging" ]

permissions:
  id-token: write
  contents: write

jobs:
  # JOB 1: Validação (Roda sempre)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsqlite3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: flutter pub get
      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Run Tests
        run: flutter test --coverage

  # JOB 2: Versionamento e Criação de Tag (Roda no Push para Main)
  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
      - name: Install Cider
        run: dart pub global activate cider
      
      - name: Auto Version Bump & Changelog
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # 1. Decide o nível e o tipo de log (Cider exige subcomandos: added, fixed, changed, etc)
          if [[ "$COMMIT_MSG" == *"feat:"* ]]; then
            LEVEL="minor"
            CIDER_CMD="added"
          elif [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]]; then
            LEVEL="major"
            CIDER_CMD="changed"
          elif [[ "$COMMIT_MSG" == *"fix:"* ]]; then
            LEVEL="patch"
            CIDER_CMD="fixed"
          else
            LEVEL="patch"
            CIDER_CMD="changed"
          fi
          
          # 2. Aumenta a versão no pubspec.yaml
          cider bump $LEVEL
          NEW_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          
          # 3. Atualiza o CHANGELOG.md usando o subcomando correto
          # Removemos o prefixo (ex: feat:) da mensagem para o log ficar limpo
          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed 's/^[a-z]*: //i')
          cider log $CIDER_CMD "$CLEAN_MSG"
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit & Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v${{ env.NEW_VERSION }} [skip ci]"
          git tag v${{ env.NEW_VERSION }}
          git push origin main
          git push origin v${{ env.NEW_VERSION }}

  # JOB 3: Publicação Real (Roda apenas quando uma TAG v* é detectada)
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - uses: dart-lang/setup-dart@v1
      - name: Install Dependencies
        run: flutter pub get
      - name: Publish to pub.dev
        run: flutter pub publish --force
