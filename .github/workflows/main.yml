name: VoltNet CI/CD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test --coverage

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      # 1. Instala o Flutter (Obrigatório pois o pacote depende do SDK do Flutter)
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. Configura o Dart SDK oficial para habilitar o OIDC (Handshake com pub.dev)
      - uses: dart-lang/setup-dart@v1

      - name: Install Dependencies
        run: flutter pub get

      # 3. Publica usando o Flutter Pub (necessário para resolver dependências de SDK)
      - name: Publish to pub.dev
        run: flutter pub publish --force
