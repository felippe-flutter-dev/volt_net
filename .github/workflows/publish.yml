name: CD - Release & Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]                  # ← ESSA LINHA É A SOLUÇÃO

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Só roda quando for push na main (bump + tag)
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: subosito/flutter-action@v2
      - run: dart pub global activate cider

      - name: Version Bump & Tag
        run: |
          MSG=$(git log -1 --pretty=%s)
          
          if [[ "$MSG" == *"feat:"* ]]; then LEVEL="minor";
          elif [[ "$MSG" == *"BREAKING CHANGE"* ]]; then LEVEL="major";
          else LEVEL="patch"; fi
          
          cider bump $LEVEL
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag v$VERSION
          git push origin main --tags

  publish:
    # Só roda quando for push de tag (agora refType = tag → pub.dev aceita)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pub.dev                    # ← obrigatório por causa da sua config
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4          # já vem na tag automaticamente

      - uses: subosito/flutter-action@v2

      - name: Setup pub.dev credentials (OIDC)
        uses: flutter-actions/setup-pubdev-credentials@v1

      - name: Publish to pub.dev
        run: dart pub publish --force