name: CD - Release & Publish

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # Só roda em push normal na main (não roda no commit de release)
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}          # ← usa o PAT para poder disparar tag depois

      - uses: subosito/flutter-action@v2
      - run: dart pub global activate cider

      - name: Version Bump & Create Tag
        run: |
          MSG=$(git log -1 --pretty=%s)
          
          if [[ "$MSG" == *"feat:"* ]]; then LEVEL="minor";
          elif [[ "$MSG" == *"BREAKING CHANGE"* ]]; then LEVEL="major";
          else LEVEL="patch"; fi
          
          cider bump $LEVEL
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag v$VERSION
          
          # Push usando PAT (isso SIM dispara o job publish)
          git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git HEAD:main --tags

  publish:
    # Só roda quando for push de tag (refType = tag → pub.dev aceita)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}   # já estamos na tag

      - uses: subosito/flutter-action@v2

      - name: Setup pub.dev credentials (OIDC)
        uses: flutter-actions/setup-pubdev-credentials@v1

      - name: Publish to pub.dev
        run: dart pub publish --force