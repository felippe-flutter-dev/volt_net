name: CD - Release & Publish

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  id-token: write   # ← essencial pro OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: subosito/flutter-action@v2
      - run: dart pub global activate cider

      - name: Version Bump
        id: versioning
        run: |
          # O script local já coloca o prefixo no commit!
          MSG=$(git log -1 --pretty=%s)
          
          if [[ "$MSG" == *"feat:"* ]]; then LEVEL="minor";
          elif [[ "$MSG" == *"BREAKING CHANGE"* ]]; then LEVEL="major";
          else LEVEL="patch"; fi
          
          cider bump $LEVEL
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag v$VERSION
          git push origin main --tags

  publish:
    needs: release
    runs-on: ubuntu-latest
    environment: pub.dev          # ← remova esta linha se não configurou o environment
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { ref: 'v${{ needs.release.outputs.new_version }}' }

      - uses: subosito/flutter-action@v2

      # ← ESSA É A LINHA MÁGICA (configura OIDC automaticamente)
      - name: Setup pub.dev credentials (OIDC)
        uses: flutter-actions/setup-pubdev-credentials@v1

      - name: Publish to pub.dev
        run: dart pub publish --force